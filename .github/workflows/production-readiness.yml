name: Production Readiness

on:
  workflow_dispatch:

jobs:
  validate:
    name: Validate production readiness
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            apps/web-admin/package-lock.json
            apps/web-teacher/package-lock.json
            apps/web-student/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Install web-admin frontend dependencies
        working-directory: apps/web-admin
        run: npm ci

      - name: Install web-teacher frontend dependencies
        working-directory: apps/web-teacher
        run: npm ci

      - name: Install web-student frontend dependencies
        working-directory: apps/web-student
        run: npm ci

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec

      - name: Run production readiness validation
        run: python scripts/validate_production_readiness.py
