services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chemistry_exam
      POSTGRES_USER: chemistry
      POSTGRES_PASSWORD: chemistry
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemistry -d chemistry_exam"]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    build:
      context: .
      dockerfile: server/Dockerfile.elasticsearch-ik
      args:
        ELASTICSEARCH_VERSION: "8.11.3"
        ANALYSIS_IK_VERSION: "8.11.3"
    image: chemistry-admin-elasticsearch-ik:8.11.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_HOST_BIND:-127.0.0.1}:${ELASTICSEARCH_HOST_PORT:-9200}:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - .env
    environment:
      CHEMISTRY_APP_ENV: development
      DATA_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://chemistry:chemistry@postgres:5432/chemistry_exam
      MEDIA_ROOT: /app/data/media
      API_PUBLIC_BASE_URL: http://127.0.0.1:8000
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS:-http://222.200.189.249:15173,http://localhost:15173,http://127.0.0.1:15173,http://localhost:15174,http://127.0.0.1:15174,http://localhost:15175,http://127.0.0.1:15175}
      STUDENT_PREVIEW_APP_BASE_URL: ${STUDENT_PREVIEW_APP_BASE_URL:-http://222.200.189.249:15173}
      STUDENT_PREVIEW_ALLOWED_ORIGINS: ${STUDENT_PREVIEW_ALLOWED_ORIGINS:-}
      STUDENT_PREVIEW_TICKET_EXPIRE_MINUTES: "10"
      STUDENT_PREVIEW_SESSION_EXPIRE_MINUTES: "240"
      TUS_UPLOAD_DIR: tus
      TUS_PUBLIC_ENDPOINT: http://127.0.0.1:10980/files/
      RAG_HYBRID_BGE_ENABLED: "true"
      RAG_BGE_SERVICE_URL: http://bge-rag:8010
      RAG_BGE_TIMEOUT_SECONDS: "60"
      RAG_RERANK_TOP_K: "9"
      CHEMISTRY_RAG_ROOT: /chemistry-rag
      WEB_ADMIN_ACCESS_TOKEN: ${WEB_ADMIN_ACCESS_TOKEN:-dev-only-web-admin-token-change-me}
      VIDEO_LIBRARY_SEARCH_ENABLED: "true"
      VIDEO_LIBRARY_SEARCH_BACKEND: elasticsearch
      VIDEO_LIBRARY_SEARCH_URL: http://elasticsearch:9200
      VIDEO_LIBRARY_SEARCH_INDEX: student-video-library
      VIDEO_LIBRARY_SEARCH_ANALYZER: ik_max_word
      VIDEO_LIBRARY_SEARCH_LOCAL_FALLBACK: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./data/media:/app/data/media
      - E:/chemistry-rag:/chemistry-rag:ro
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  web-student:
    build:
      context: .
      dockerfile: server/Dockerfile.frontend
      args:
        APP_DIR: apps/web-student
    environment:
      BACKEND_UPSTREAM: http://backend:8000
      FRAME_ANCESTORS: "'self' http://127.0.0.1:${WEB_TEACHER_HOST_PORT:-15174} http://localhost:${WEB_TEACHER_HOST_PORT:-15174}"
    ports:
      - "${WEB_STUDENT_HOST_BIND:-222.200.189.249}:${WEB_STUDENT_HOST_PORT:-15173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  web-teacher:
    build:
      context: .
      dockerfile: server/Dockerfile.frontend
      args:
        APP_DIR: apps/web-teacher
    environment:
      BACKEND_UPSTREAM: http://backend:8000
      FRAME_ANCESTORS: "'self'"
    ports:
      - "${WEB_TEACHER_HOST_BIND:-127.0.0.1}:${WEB_TEACHER_HOST_PORT:-15174}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  web-admin:
    build:
      context: .
      dockerfile: server/Dockerfile.frontend
      args:
        APP_DIR: apps/web-admin
    environment:
      BACKEND_UPSTREAM: http://backend:8000
      FRAME_ANCESTORS: "'self'"
    ports:
      - "${WEB_ADMIN_HOST_BIND:-127.0.0.1}:${WEB_ADMIN_HOST_PORT:-15175}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  bge-rag:
    profiles:
      - rag
    build:
      context: .
      dockerfile: server/Dockerfile.bge-rag
    environment:
      BGE_EMBED_MODEL: /models/BAAI/bge-m3
      BGE_RERANK_MODEL: /models/BAAI/bge-reranker-v2-m3
      BGE_DEVICE: cpu
      BGE_USE_FP16: "false"
      BGE_RERANK_MAX_LENGTH: "512"
      BGE_WARMUP_ON_STARTUP: "true"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    ports:
      - "8010:8010"
    volumes:
      - E:/models/BAAI:/models/BAAI:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=2).read()"]
      interval: 15s
      timeout: 10s
      retries: 20

  tusd:
    image: tusproject/tusd:v2
    command:
      - "-host=0.0.0.0"
      - "-port=1080"
      - "-base-path=/files/"
      - "-upload-dir=/app/data/media/tus"
      - "-max-size=107374182400"
    ports:
      - "10980:1080"
    volumes:
      - ./data/media:/app/data/media

  video-worker:
    build:
      context: .
      dockerfile: server/Dockerfile.video-worker
    env_file:
      - .env
    environment:
      CHEMISTRY_APP_ENV: development
      DATA_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://chemistry:chemistry@postgres:5432/chemistry_exam
      MEDIA_ROOT: /app/data/media
      VIDEO_WORKER_ID: local-video-worker
      VIDEO_WORKER_POLL_SECONDS: 5
      VIDEO_LEARNING_MAX_WIDTH: 1280
      VIDEO_LEARNING_CRF: 24
      VIDEO_LEARNING_MAX_FPS: 30
      VIDEO_LEARNING_TRANSCODE_THRESHOLD_MB: 300
      VIDEO_SIMILARITY_ALGORITHM: vpdq-threatexchange-1.2.16
      VIDEO_SIMILARITY_COMMAND: python -m server.app.video_similarity vpdq-signature "{input}" "{output}"
      VIDEO_SIMILARITY_COMPARE_COMMAND: python -m server.app.video_similarity vpdq-compare "{current}" "{candidate}"
      VIDEO_SIMILARITY_THRESHOLD: 0.86
      VIDEO_VPDQ_SECONDS_PER_HASH: 1
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  elasticsearch_data:
  bge_models:
